name: Feature Request
description: Suggest an idea for AI Council
title: "[Feature]: "
labels: ["enhancement"]
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting an improvement to AI Council! Please check `ROADMAP.md` before submitting to see if your idea is already planned.
  - type: textarea
    id: problem
    attributes:
      label: Problem Description
      description: Is your feature request related to a problem? Please describe.
      placeholder: I'm always frustrated when...
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like to see implemented.
      placeholder: I would like the council to be able to...
    validations:
      required: true
  - type: dropdown
    id: roadmap-phase
    attributes:
      label: Related Roadmap Phase
      description: Does this align with an existing phase in the ROADMAP.md?
      options:
        - "Phase 1: Fix Parallel Execution"
        - "Phase 2: Structured Output Contract"
        - "Phase 3: Peer Review + Anonymized Ranking"
        - "Phase 4: Scoring Engine"
        - "Phase 5: Split Critic Roles"
        - "Phase 6: Consensus Metric"
        - "Phase 7: Cross-Agent Interaction"
        - "Phase 8: Multi-Round Refinement"
        - "Phase 9: Tool Execution Layer"
        - "Phase 10: Memory + Context System"
        - "Phase 11: Router (Auto-Council)"
        - "Phase 12: Failure Isolation"
        - "Phase 13: Token + Cost Tracking"
        - "Phase 14: Evaluation Framework"
        - "Phase 15: UI Enhancements"
        - "Atticus Addition A: Cost Ledger"
        - "Atticus Addition B: Cold Validator"
        - "Atticus Addition C: PII Detection"
        - "Atticus Addition D: Editable Archetypes"
        - "Atticus Addition E: Conversation Search"
        - "Atticus Addition F: Audit Log"
        - "New — not in roadmap"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Describe any alternative solutions or features you've considered.
  - type: dropdown
    id: willing-to-implement
    attributes:
      label: Willing to Implement?
      description: Are you willing to submit a Pull Request for this feature?
      options:
        - "Yes, I can write the code"
        - "No, I just want to suggest it"
    validations:
      required: true